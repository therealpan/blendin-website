/* ====== i18n ENGINE ====== */
var curLang='it';
function detectLang(){
  var bl=navigator.language||navigator.userLanguage||'it';
  var short=bl.substring(0,2).toLowerCase();
  return T[short]?short:'it';
}
function setLang(lang){
  if(!T[lang])return;
  curLang=lang;
  localStorage.setItem('bl_lang',lang);
  document.documentElement.lang=lang;
  /* Update text elements */
  document.querySelectorAll('[data-i]').forEach(function(el){
    var key=el.getAttribute('data-i');
    var val=T[lang][key];
    if(!val)return;
    if(el.hasAttribute('data-i-html'))el.innerHTML=val;
    else el.textContent=val;
  });
  /* Update headline */
  buildHeadline(lang);
  /* Update modal */
  document.getElementById('modalTitle').textContent=T[lang].modal_title;
  document.getElementById('modalSub').textContent=T[lang].modal_sub;
  document.getElementById('loungeCode').placeholder=T[lang].modal_ph;
  /* Update s2 paragraphs that use innerHTML */
  var s2ps=document.querySelectorAll('.s2t p[data-i]');
  s2ps.forEach(function(p){var k=p.getAttribute('data-i');if(T[lang][k])p.innerHTML=T[lang][k]});
  /* Flag buttons */
  document.querySelectorAll('.lang-sw button').forEach(function(b){
    b.classList.toggle('active',b.getAttribute('data-lang')===lang);
  });
}

function buildHeadline(lang){
  var h=document.getElementById('h1');
  h.innerHTML='';
  var lines=[T[lang].hero_l1,T[lang].hero_l2];
  var i=0;
  lines.forEach(function(l,li){
    if(li===1)h.appendChild(document.createElement('br'));
    l.split(' ').forEach(function(w){
      var s=document.createElement('span');
      s.className='w';
      s.style.animationDelay=(.5+i*.11)+'s';
      s.textContent=w+'\u00A0';
      h.appendChild(s);
      i++;
    });
  });
}

/* ====== INIT LANGUAGE ====== */
var savedLang=localStorage.getItem('bl_lang');
setLang(savedLang||detectLang());

/* ====== INTERSECTION OBSERVER ====== */
!function(){var o=new IntersectionObserver(function(e){e.forEach(function(e){if(!e.isIntersecting)return;var t=e.target;
if(t.hasAttribute('data-r'))t.classList.add('v');
if(t.dataset.target!==undefined&&!t.dataset.counted){t.dataset.counted='1';var g=parseInt(t.dataset.target);if(isNaN(g))return;
var p=t.dataset.prefix||'',x=t.dataset.suffix||'',d=900,s=performance.now();
!function k(n){var r=Math.min((n-s)/d,1);t.textContent=p+Math.round((1-Math.pow(1-r,3))*g)+x;if(r<1)requestAnimationFrame(k)}(s)}})},{threshold:.1,rootMargin:'0px 0px -30px 0px'});
document.querySelectorAll('[data-r],[data-target]').forEach(function(e){o.observe(e)})}();

/* ====== PARALLAX ====== */
!function(){if(matchMedia('(prefers-reduced-motion:reduce)').matches||innerWidth<900)return;
var b=document.querySelectorAll('.sc-bg'),t=false;
addEventListener('scroll',function(){if(!t){requestAnimationFrame(function(){for(var i=0;i<b.length;i++){var r=b[i].parentElement.getBoundingClientRect();b[i].style.transform='translateY('+(r.top+r.height/2-innerHeight/2)*.07+'px) scale(1.06)'}t=false});t=true}})}();

/* ====== LOUNGE MODAL ====== */
var modal=document.getElementById('loungeModal'),
    modalImg=document.getElementById('modalImg'),
    modalTitle=document.getElementById('modalTitle'),
    modalSub=document.getElementById('modalSub'),
    modalDenied=document.getElementById('modalDenied'),
    codeInput=document.getElementById('loungeCode');

function openLounge(){
  modal.classList.add('open');
  document.body.style.overflow='hidden';
  resetModal();
  setTimeout(function(){codeInput.focus()},400);
}
function closeLounge(){
  modal.classList.remove('open');
  document.body.style.overflow='';
}
function resetModal(){
  modalImg.src='assets/blendy-bouncer.webp';
  modalTitle.textContent=T[curLang].modal_title;
  modalSub.textContent=T[curLang].modal_sub;
  codeInput.placeholder=T[curLang].modal_ph;
  modalDenied.classList.remove('show');
  modalDenied.textContent='';
  codeInput.value='';
  codeInput.classList.remove('shake');
  codeInput.style.borderColor='';
}
function checkCode(){
  var code=codeInput.value.trim();
  if(!code)return;
  /* Defer all DOM mutations to next frame to avoid blocking INP */
  requestAnimationFrame(function(){
    modalImg.style.opacity='0';modalImg.style.transform='scale(.9)';
    setTimeout(function(){
      modalImg.src='assets/blendy-no.webp';
      modalTitle.textContent=T[curLang].modal_denied;
      modalSub.textContent='';
      requestAnimationFrame(function(){modalImg.style.opacity='1';modalImg.style.transform='scale(1)'});
    },200);
    /* Restart shake via class toggle — no forced reflow */
    codeInput.classList.remove('shake');
    requestAnimationFrame(function(){
      codeInput.classList.add('shake');
      codeInput.style.borderColor='var(--coral)';
    });
    var lines=T[curLang].denied;
    modalDenied.textContent=lines[Math.floor(Math.random()*lines.length)];
    modalDenied.classList.add('show');
    setTimeout(function(){codeInput.style.borderColor='';codeInput.classList.remove('shake')},600);
  });
}
modal.addEventListener('click',function(e){if(e.target===modal)closeLounge()});
addEventListener('keydown',function(e){if(e.key==='Escape'&&modal.classList.contains('open'))closeLounge()});
codeInput.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();checkCode()}});
</script>
